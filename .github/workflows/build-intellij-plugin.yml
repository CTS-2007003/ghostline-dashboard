name: Build IntelliJ Plugin

on:
  workflow_dispatch:   # trigger manually from Actions tab whenever you want a new .zip

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        working-directory: packages/intellij-plugin
        run: gradle buildPlugin

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: ghostline-intellij-plugin
          # Gradle puts the zip in build/distributions/
          path: packages/intellij-plugin/build/distributions/*.zip
          retention-days: 30
