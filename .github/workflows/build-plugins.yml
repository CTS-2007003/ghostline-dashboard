name: Build Plugins

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-vscode:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: packages/vscode-extension
        run: npm install

      - name: Compile TypeScript
        working-directory: packages/vscode-extension
        run: npm run compile

      - name: Package .vsix
        working-directory: packages/vscode-extension
        run: npx vsce package --no-dependencies

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostline-vscode
          path: packages/vscode-extension/*.vsix
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: packages/vscode-extension/*.vsix

  build-intellij:
    name: Build IntelliJ Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build plugin
        working-directory: packages/intellij-plugin
        run: ./gradlew buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostline-intellij
          path: packages/intellij-plugin/build/distributions/*.zip
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: packages/intellij-plugin/build/distributions/*.zip
